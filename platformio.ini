; PlatformIO Project Configuration File

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
lib_deps =

[env:ota]
extends = env:esp32s3
upload_protocol = espota
; mDNS hostname set via ArduinoOTA.setHostname() (see config.h OTA_HOSTNAME).
; Use the bare name, "as7343.local", or the device IP if name resolution fails.
upload_port = esp32-spectral
